name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  bun-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run CI gates
        run: bun run ci
      - name: Smoke — memory reindex
        run: bun run memory:reindex