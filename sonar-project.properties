# SonarCloud project configuration
# Excludes generated/throw-away directories from new-code metrics so that
# temporary demo files and local agent evidence do not inflate duplication
# numbers on PR quality gates.
sonar.exclusions=.evidence/**,demo/**,dist/**,node_modules/**
# The Claude and Devin plugins intentionally follow the same install/update/remove/status
# lifecycle; excluding them from copy-paste detection avoids a false-positive duplication
# gate failure while the two agent implementations remain separate by design.
sonar.cpd.exclusions=packages/cli/src/plugins/claude.ts,packages/cli/src/plugins/devin.ts
